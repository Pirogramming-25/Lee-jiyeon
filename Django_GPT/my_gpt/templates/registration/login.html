{% extends "my_gpt/base.html" %}

{% block title %}로그인{% endblock %}

{% block content %}
<section class="panel">
    <h1>로그인</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="hidden" name="next" value="{{ next }}" />
        <button type="submit" class="run-button">로그인</button>
    </form>
</section>

{% if request.GET.required == "1" %}
<script>
    alert("로그인 후 이용해주세요");
</script>
{% endif %}
{% endblock %}
