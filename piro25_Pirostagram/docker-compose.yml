services:
  db:
    image: mysql:8.4
    container_name: pirostagram-db
    env_file:
      - .env
    volumes:
      - pirostagram-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    image: jiyeoniii/pirostagram:latest
    container_name: pirostagram-web
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./media:/app/media

volumes:
  pirostagram-mysql-data: